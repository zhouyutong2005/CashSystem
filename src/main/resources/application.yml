server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cash_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456  # 改成你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5

  # Redis配置（更新写法）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 600000   # 默认缓存过期时间 10 分钟（毫秒）

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cashsystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发时显示SQL

# 日志配置
logging:
  level:
    com.cashsystem: debug
    org.springframework.security: info
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/cash-system.log

# 自定义JWT配置（这些警告可以忽略，或者创建配置类来消除）
jwt:
  secret: "cash-system-secret-key-2025-spring-boot-jwt-token"
  expiration: 86400000  # 24小时
  header: "Authorization"

# 应用信息（这些警告可以忽略）
app:
  version: "1.0.0"
  name: "现金缴存系统"